            }, 3000);

                }
            }, 1000);
        }

            const speedTitles = ["?пҒ№оӯЈй–«???пҺҠ?", "й һпҶҜ??оё…оҰғиқәо«ҙ?ж’ұз®„ВҖ?, "з’ҶиҸҹВҖоёҒпҷЈз’ҲоёҒ?й–«??ж‘°?];

            if (failures === 0 && elapsed < 600) {
                return perfectTitles[Math.floor(Math.random() * perfectTitles.length)];
            } else if (elapsed < 900) {
                return speedTitles[Math.floor(Math.random() * speedTitles.length)];
            } else if (failures >= 5) {

            }

                            }
                        }
                        
                        if (cloudTeam.failureCount !== failureCount) {

                        }
                        
                        if (cloudTeam.gameCleared !== gameCleared) {
                            gameCleared = cloudTeam.gameCleared;
                            if (gameCleared) {
                                goToEnding(false);
                            }
                        }
                        
                        const initialSeconds = 100 * 60;
                        const cloudRemaining = initialSeconds - cloudTeam.elapsedSeconds;
                        if (Math.abs(totalSeconds - cloudRemaining) > 10) {
                            totalSeconds = cloudRemaining;
                            updateTimerDisplay();
                        }
                        
                        if (existingIdx > -1) {
                            localTeams[existingIdx] = cloudTeam;
                        } else {
                            localTeams.push(cloudTeam);
                        }
                        localStorage.setItem('trump_mission_teams', JSON.stringify(localTeams));
                        
                        if (questStatusChanged) {
                            updateMenuProgress();
                        }
                    }
                }
            } catch (e) {
                console.error("Player sync from cloud failed:", e);
            }
        }

        function getSortedRankings() {
            let teams = [];
            try {
                teams = JSON.parse(localStorage.getItem('trump_mission_teams')) || [];
            } catch(e) {
                teams = [];
            }
            
            // ?оқҶоЁ’иқӣз®ҮоЁ«?о»ӯndefined ??null ?п’ҝ?
            teams = teams.filter(t => t && t.name && t.name !== "undefined" && t.name !== "null" && t.name.trim() !== "");
            
            teams.forEach(t => {
                if (t.firstElapsedSeconds === undefined) t.firstElapsedSeconds = null;
                if (t.firstFailureCount === undefined) t.firstFailureCount = null;
                if (t.firstTitle === undefined) t.firstTitle = "";
                if (t.playCount === undefined) t.playCount = 0;
            });
            
            teams.sort((a, b) => {
                const aCleared = a.gameCleared || (a.playCount > 0);
                const bCleared = b.gameCleared || (b.playCount > 0);
                
                if (aCleared !== bCleared) {
                    return aCleared ? -1 : 1;
                }
                
                if (aCleared) {
                    // ж’Ңи„ӨВҖо«ҙ??п’ҝ??иҠё??пҗ§?з”ҲвҠҝВҖо«ҙ??оҝң??пӢ©д»ғ?оӨҡжҙ»?иұў?ж‘Ё?
                    const aTime = a.firstElapsedSeconds !== null ? a.firstElapsedSeconds : a.elapsedSeconds;
                    const bTime = b.firstElapsedSeconds !== null ? b.firstElapsedSeconds : b.elapsedSeconds;
                    if (aTime !== bTime) {
                        return aTime - bTime;
                    }
                    const aFails = a.firstFailureCount !== null ? a.firstFailureCount : a.failureCount;
                    const bFails = b.firstFailureCount !== null ? b.firstFailureCount : b.failureCount;
                    if (aFails !== bFails) {
                        return aFails - bFails;
                    }
                    return a.startTime - b.startTime;
                } else {
                    // ?и„°?йҠқеүқ?йҡЎпҡҳ??ж№§??и©»ВҖојј??оӨҡ??оҡҰ?ж‘Ё?
                    const aDone = Object.values(a.questStatus || {}).filter(Boolean).length;
                    const bDone = Object.values(b.questStatus || {}).filter(Boolean).length;
                    if (aDone !== bDone) {
                        return bDone - aDone;
                    }
                    if (a.elapsedSeconds !== b.elapsedSeconds) {
                        return a.elapsedSeconds - b.elapsedSeconds;
                    }
                    return a.startTime - b.startTime;
                }
            });
            
            return teams;
        }

        function formatDuration(seconds) {
            if (seconds === undefined || seconds === null || seconds < 0) return "-";
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m + "?? + (s < 10 ? "0" + s : s) + "иқҳ?;
        }
