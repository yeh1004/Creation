<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小說記錄器 - 您的閱讀足跡與評分管理</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="app-container">
        <!-- 頁首區塊 -->
        <header class="app-header">
            <h1 class="logo-title">小說記錄器</h1>
            <p class="subtitle">珍藏您的閱讀足跡，寫下專屬的十評印記</p>
        </header>

        <!-- 輸入網址區塊 -->
        <section class="search-section glass-panel">
            <div class="tab-header">
                <button class="tab-btn active" data-tab="single-tab">單筆新增</button>
                <button class="tab-btn" data-tab="bulk-tab">批量匯入</button>
            </div>
            
            <div class="tab-content" id="single-tab">
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                        <input type="url" id="novel-url-input" placeholder="請貼上小說網址 (例如：思兔、小說狂人、起點...)" autocomplete="off">
                    </div>
                    <button id="btn-parse" class="btn btn-primary">
                        <span class="btn-text">自動解析</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
                <p class="input-tip">支援自動分析書名與作者，亦可手動調整與評分。</p>
            </div>
            
            <div class="tab-content hidden" id="bulk-tab">
                <div class="textarea-group">
                    <textarea id="bulk-urls-input" placeholder="請貼上多個小說網址，每行一個網址...&#10;https://www.sto.cx/book-1234.html&#10;https://novelmad.com/novel/5678.html" rows="4"></textarea>
                    <button id="btn-bulk-import" class="btn btn-primary">
                        <span class="btn-text">開始匯入</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
                <p class="input-tip">批量匯入會於後台自動解析網址（不彈出確認框），預設為未評分，將置於列表最底端。</p>
            </div>
        </section>

        <!-- 列表排序控制與統計 -->
        <section class="list-control">
            <div class="list-stats">
                共記錄了 <span id="total-count">0</span> 本小說
            </div>
            <div class="sort-indicator">
                <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
                依評分排序 (高 → 低)，同分時以新加入優先
            </div>
        </section>

        <!-- 小說卡片列表 -->
        <main class="novels-grid" id="novels-list">
            <!-- 動態渲染卡片放置處 -->
            <div class="empty-state glass-panel">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <p>目前還沒有任何小說紀錄</p>
                <span>請在上方輸入網址並點選「自動解析」來新增第一本小說。</span>
            </div>
        </main>
    </div>

    <!-- 編輯/確認彈窗 (Modal) -->
    <div class="modal-backdrop hidden" id="novel-modal">
        <div class="modal-content glass-panel animate-pop">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-heading">確認小說資訊</h3>
                <button class="btn-close" id="btn-close-modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="novel-form">
                    <input type="hidden" id="modal-novel-id">
                    <div class="form-group">
                        <label for="modal-title-input">小說名稱</label>
                        <input type="text" id="modal-title-input" required placeholder="請輸入小說標題">
                    </div>
                    <div class="form-group">
                        <label for="modal-author-input">作者</label>
                        <input type="text" id="modal-author-input" placeholder="請輸入作者名稱">
                    </div>
                    <div class="form-group">
                        <label for="modal-url-input">小說網址</label>
                        <input type="url" id="modal-url-input" placeholder="請輸入小說連結（選填）">
                    </div>
                    <div class="form-group">
                        <label>給予評分 (滿分 10 分)</label>
                        <div class="rating-input-container">
                            <div class="star-rating" id="modal-star-rating">
                                <!-- 1-10 顆星星 -->
                                <span class="star-item" data-val="1">★</span>
                                <span class="star-item" data-val="2">★</span>
                                <span class="star-item" data-val="3">★</span>
                                <span class="star-item" data-val="4">★</span>
                                <span class="star-item" data-val="5">★</span>
                                <span class="star-item" data-val="6">★</span>
                                <span class="star-item" data-val="7">★</span>
                                <span class="star-item" data-val="8">★</span>
                                <span class="star-item" data-val="9">★</span>
                                <span class="star-item" data-val="10">★</span>
                            </div>
                            <div class="rating-badge-display">
                                <span id="rating-number-val">10</span>分
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btn-cancel-modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-save-novel">儲存紀錄</button>
            </div>
        </div>
    </div>

    <!-- 提示框元件 (Toast Notification) -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
